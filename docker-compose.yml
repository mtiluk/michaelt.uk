services:
  web:
    build: .
    image: michaelt:latest
    container_name: michaelt-web
    restart: unless-stopped
    env_file: .env
    ports:
      - "3001:3000"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - web

  redis:
    image: redis:7-alpine
    container_name: michaelt-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - web

volumes:
  redis-data:

networks:
  web:
